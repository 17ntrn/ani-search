<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Copy & Exit</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/clipboard.js/2.0.11/clipboard.min.js"></script>
    <style>
        body { 
            background: #000; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
        }
        #copyBtn { 
            background: #222; 
            color: #fff; 
            border: 1px solid #444; 
            padding: 20px 40px; 
            border-radius: 4px; 
            font-family: monospace; 
            cursor: pointer;
            width: 80%;
        }
        #copyBtn:active { background: #333; }
    </style>
</head>
<body>

    <button id="copyBtn" data-clipboard-text="">COPY TITLE</button>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const title = urlParams.get('q');
        const btn = document.getElementById('copyBtn');

        if (title) {
            btn.setAttribute('data-clipboard-text', decodeURIComponent(title));
        } else {
            btn.innerText = "NO DATA";
        }

        const clipboard = new ClipboardJS('#copyBtn');

        clipboard.on('success', function(e) {
            // Logical sequence: Copy confirmed -> Attempt Close
            e.clearSelection();
            window.close();
            
            // Fallback: If window.close() is blocked, change text to signal success
            btn.innerText = "COPIED - CLOSE MANUALLY";
            btn.style.borderColor = "#0f0";
        });

        clipboard.on('error', function() {
            btn.innerText = "FAILED";
            btn.style.borderColor = "#f00";
        });
    </script>
</body>
</html>
